apiVersion: v1
kind: ConfigMap
metadata:
  name: user-be-config
data:
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_ENABLED: "false"
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://postgres:postgres123@postgres:5432/rakshasetu?schema=public"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-be
  labels:
    app: user-be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-be
  template:
    metadata:
      labels:
        app: user-be
    spec:
      initContainers:
        - name: prisma-migrate
          image: neutron420/rakshasetu-user-be:latest
          command:
            [
              "sh",
              "-c",
              "bunx prisma migrate deploy --schema=./packages/user-be/prisma/schema.prisma || bunx prisma migrate deploy",
            ]
          envFrom:
            - configMapRef:
                name: user-be-config
      containers:
        - name: user-be
          # Important: Change this image name to your actual container registry path after pushing the image.
          # e.g., your-dockerhub-username/rakshasetu-user-be:latest
          image: neutron420/rakshasetu-user-be:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: user-be-config

---
apiVersion: v1
kind: Service
metadata:
  name: user-be
spec:
  selector:
    app: user-be
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP

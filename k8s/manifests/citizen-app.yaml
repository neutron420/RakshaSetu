apiVersion: v1
kind: ConfigMap
metadata:
  name: citizen-app-config
data:
  NODE_ENV: "production"
  # Backend API URL - update this to your actual backend service URL
  API_URL: "http://user-be:5001"
  EXPO_PUBLIC_API_URL: "http://user-be:5001"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citizen-app
  labels:
    app: citizen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: citizen-app
  template:
    metadata:
      labels:
        app: citizen-app
    spec:
      containers:
        - name: citizen-app
          # Important: Change this image name to your actual container registry path
          # e.g., your-dockerhub-username/rakshasetu-citizen-app:latest
          image: neutron420/rakshasetu-citizen-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: citizen-app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: citizen-app
spec:
  selector:
    app: citizen-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citizen-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: citizen.rakshasetu.local  # Update to your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: citizen-app
                port:
                  number: 80

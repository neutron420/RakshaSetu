name: CI / Build and Push to Registry

on:
    push:
        branches:
            - main
        paths:
            - "packages/user-be/**"
            - "Dockerfile"
            - "package.json"
            - "bun.lock"

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  # Use the Git Commit Hash as the image tag for perfect ArgoCD Syncing
                  tags: neutron420/rakshasetu-user-be:${{ github.sha }}

            - name: Update Kubernetes Manifest
              run: |
                  # This perfectly syncs the newly built image back into the Kubernetes Manifests
                  sed -i "s|image: neutron420/rakshasetu-user-be:.*|image: neutron420/rakshasetu-user-be:${{ github.sha }}|g" k8s/manifests/user-be.yaml
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "actions@github.com"
                  git add k8s/manifests/user-be.yaml
                  git commit -m "chore: update user-be image tag to ${{ github.sha }}" || echo "No changes to commit"
                  git push
